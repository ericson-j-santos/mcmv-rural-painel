<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel MCMV Rural — Acompanhamento de Implantação</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }

  header {
    background: linear-gradient(135deg, #1a56a0, #0d3d73);
    color: white; padding: 18px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  header .logo { font-size: 28px; }
  header h1 { font-size: 1.3rem; font-weight: 700; line-height: 1.2; }
  header p { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

  /* Cards de resumo */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card {
    background: white; border-radius: 10px; padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid var(--accent, #1a56a0);
  }
  .card .val { font-size: 2rem; font-weight: 800; color: var(--accent, #1a56a0); line-height: 1; }
  .card .lbl { font-size: 0.75rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* Funil de etapas */
  .section-title { font-size: 1rem; font-weight: 700; color: #1a202c; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; display: block; width: 4px; height: 18px; background: #1a56a0; border-radius: 2px; }

  .etapas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .etapa-card {
    background: white; border-radius: 10px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    border-top: 3px solid var(--cor, #94a3b8);
    position: relative;
  }
  .etapa-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
  .etapa-card.ativa { box-shadow: 0 0 0 2px var(--cor, #1a56a0); }
  .etapa-card .num { font-size: 0.68rem; font-weight: 700; color: var(--cor, #64748b); text-transform: uppercase; letter-spacing: 1px; }
  .etapa-card .nome { font-size: 0.88rem; font-weight: 600; margin: 4px 0; }
  .etapa-card .total { font-size: 1.6rem; font-weight: 800; color: var(--cor, #1a56a0); }
  .etapa-card .sub { font-size: 0.72rem; color: #64748b; }
  .badge-pct {
    position: absolute; top: 12px; right: 12px;
    font-size: 0.72rem; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; background: var(--cor, #94a3b8);
    color: white;
  }

  /* Barra de progresso por UF */
  .dois-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media (max-width: 900px) { .dois-col { grid-template-columns: 1fr; } }

  .painel-box { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .uf-lista { max-height: 320px; overflow-y: auto; }
  .uf-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .uf-nome { width: 36px; font-size: 0.78rem; font-weight: 700; color: #1a56a0; flex-shrink: 0; }
  .uf-bar-wrap { flex: 1; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
  .uf-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #1a56a0, #3b82f6); transition: width .4s; }
  .uf-qtd { width: 70px; text-align: right; font-size: 0.75rem; color: #64748b; flex-shrink: 0; }

  /* Filtros e tabela */
  .filtros { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .filtros select, .filtros input {
    padding: 7px 12px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 0.82rem; background: white; outline: none;
  }
  .filtros select:focus, .filtros input:focus { border-color: #1a56a0; }
  .filtros .count-badge {
    margin-left: auto; font-size: 0.78rem; color: #64748b;
    background: #f1f5f9; padding: 5px 12px; border-radius: 20px;
  }

  .tabela-wrap { background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    background: #1a56a0; color: white; padding: 10px 12px;
    text-align: left; font-weight: 600; font-size: 0.78rem;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { background: #1447884d; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .td-uf { font-weight: 700; color: #1a56a0; }
  .td-proposta { font-family: monospace; font-size: 0.72rem; color: #94a3b8; }

  /* Badge de etapa */
  .etapa-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
    border: 1.5px solid transparent; white-space: nowrap;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  select.etapa-sel {
    border: none; background: transparent; font-size: 0.78rem;
    cursor: pointer; padding: 2px 4px; border-radius: 6px;
    color: #1a202c; font-weight: 600;
  }
  select.etapa-sel:hover { background: #f1f5f9; }

  .paginacao { display: flex; align-items: center; gap: 8px; padding: 12px 16px; justify-content: flex-end; border-top: 1px solid #f1f5f9; }
  .paginacao button {
    padding: 5px 12px; border: 1px solid #cbd5e1; background: white;
    border-radius: 6px; cursor: pointer; font-size: 0.8rem;
  }
  .paginacao button:disabled { opacity: .4; cursor: default; }
  .paginacao button.ativa { background: #1a56a0; color: white; border-color: #1a56a0; }
  .paginacao .info { font-size: 0.78rem; color: #64748b; }

  .btn-exportar {
    background: #1a56a0; color: white; border: none; border-radius: 7px;
    padding: 7px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
  }
  .btn-exportar:hover { background: #144480; }

  .chart-wrap { height: 260px; position: relative; }

  .loading { text-align: center; padding: 60px; color: #64748b; font-size: 0.9rem; }

  /* CNPJ link */
  .cnpj-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: monospace; font-size: 0.72rem; color: #1a56a0;
    text-decoration: none; border-bottom: 1px dashed #93c5fd;
    padding-bottom: 1px;
  }
  .cnpj-link:hover { color: #0d3d73; border-bottom-color: #1a56a0; }
  .cnpj-sem { font-size: 0.72rem; color: #cbd5e1; font-style: italic; }

  /* UUID hash chip com botão copiar */
  .hash-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: #f1f5f9; border-radius: 6px; padding: 2px 6px;
    font-family: monospace; font-size: 0.68rem; color: #475569;
    max-width: 160px;
  }
  .hash-chip .hash-full { display: none; }
  .hash-chip .hash-curto { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hash-chip:hover { background: #e2e8f0; }
  .btn-copiar {
    background: none; border: none; cursor: pointer;
    color: #94a3b8; padding: 0; line-height: 1; font-size: 0.75rem;
    flex-shrink: 0;
  }
  .btn-copiar:hover { color: #1a56a0; }
  .btn-copiar.copiado { color: #16a34a; }

  /* Modal de detalhe */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .modal-box {
    background: white; border-radius: 14px; padding: 28px;
    max-width: 560px; width: 94%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal-box h3 { font-size: 1rem; font-weight: 700; color: #1a202c; margin-bottom: 18px; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 0.82rem; }
  .modal-label { width: 110px; color: #64748b; font-weight: 600; flex-shrink: 0; }
  .modal-val { color: #1a202c; word-break: break-all; }
  .modal-val.mono { font-family: monospace; font-size: 0.75rem; }
  .modal-close {
    margin-top: 20px; padding: 8px 20px; border: 1px solid #cbd5e1;
    border-radius: 8px; background: white; cursor: pointer; font-size: 0.82rem;
  }
  .modal-close:hover { background: #f1f5f9; }
  .tag-incompleto {
    display: inline-block; background: #fef3c7; color: #92400e;
    border: 1px solid #fcd34d; border-radius: 4px;
    font-size: 0.65rem; font-weight: 700; padding: 1px 6px;
    vertical-align: middle; margin-left: 4px;
  }

  /* ── Navegação por abas ─────────────────────────────────────────────── */
  .tab-nav {
    background: white; border-bottom: 2px solid #e2e8f0;
    display: flex; gap: 0; padding: 0 20px;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .tab-btn {
    padding: 14px 20px; border: none; background: transparent;
    font-size: 0.85rem; font-weight: 600; color: #64748b;
    cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: #1a56a0; }
  .tab-btn.ativa { color: #1a56a0; border-bottom-color: #1a56a0; }
  .tab-btn .tab-badge {
    display: inline-block; background: #e0edff; color: #1a56a0;
    border-radius: 10px; font-size: 0.68rem; font-weight: 700;
    padding: 1px 7px; margin-left: 5px;
  }

  /* ── Aba Hash & CNPJ ───────────────────────────────────────────────── */
  .hc-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 22px; }
  .hc-card {
    background: white; border-radius: 10px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-top: 3px solid var(--hc, #1a56a0);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    position: relative;
  }
  .hc-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
  .hc-card.ativa { box-shadow: 0 0 0 2px var(--hc, #1a56a0); }
  .hc-card .hc-val { font-size: 1.8rem; font-weight: 800; color: var(--hc, #1a56a0); line-height: 1; }
  .hc-card .hc-lbl { font-size: 0.72rem; color: #64748b; margin-top: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .hc-card .hc-sub { font-size: 0.7rem; color: #94a3b8; margin-top: 3px; }
  .hc-card .hc-hint { position: absolute; top: 10px; right: 10px; font-size: 0.65rem; color: var(--hc,#94a3b8); opacity: .6; }

  .uuid-full {
    font-family: monospace; font-size: 0.72rem; color: #334155;
    background: #f8fafc; border-radius: 5px; padding: 3px 7px;
    display: inline-flex; align-items: center; gap: 5px; max-width: 290px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cnpj-status { display: inline-flex; align-items: center; gap: 6px; }
  .dot-ok  { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
  .dot-err { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }

  /* ── Aba Operações ──────────────────────────────────────────────────── */
  .op-toolbar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
    background: white; border-radius: 10px; padding: 14px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px;
  }
  .op-toolbar select {
    padding: 7px 12px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 0.85rem; font-weight: 600; color: #1a202c; background: white;
  }
  .op-toolbar .sep { flex: 1; }
  .btn-avancar {
    background: #16a34a; color: white; border: none; border-radius: 7px;
    padding: 8px 18px; font-size: 0.85rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-avancar:hover { background: #15803d; }
  .btn-avancar:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-sel-todos {
    background: white; border: 1px solid #cbd5e1; border-radius: 7px;
    padding: 7px 14px; font-size: 0.82rem; cursor: pointer;
  }
  .btn-sel-todos:hover { background: #f1f5f9; }

  tbody tr.op-sel { background: #eff6ff !important; }
  tbody td.td-check { width: 40px; text-align: center; }
  tbody td.td-check input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

  .hist-feed { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .hist-item {
    background: white; border-radius: 8px; padding: 12px 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    display: flex; align-items: center; gap: 12px; font-size: 0.82rem;
  }
  .hist-item .hist-loc  { font-weight: 700; min-width: 120px; }
  .hist-item .hist-fluxo { display: flex; align-items: center; gap: 6px; flex: 1; }
  .hist-item .hist-de   { color: #64748b; }
  .hist-item .hist-arr  { color: #94a3b8; }
  .hist-item .hist-para { font-weight: 600; color: #1a56a0; }
  .hist-item .hist-data { color: #94a3b8; font-size: 0.75rem; margin-left: auto; white-space: nowrap; }
  .hist-vazio { color: #94a3b8; font-size: 0.85rem; padding: 20px; text-align: center; }

  /* ── Kanban bar ────────────────────────────────────────────────────── */
  .kanban-bar {
    display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 16px;
  }
  .kanban-col {
    background: white; border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-top: 3px solid var(--kc,#94a3b8);
    cursor: pointer; transition: transform .15s, box-shadow .15s; text-align: center;
  }
  .kanban-col:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
  .kanban-col.ativa { box-shadow: 0 0 0 2px var(--kc,#1a56a0); }
  .kanban-col .kanban-nome { font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; line-height: 1.3; }
  .kanban-col .kanban-count { font-size: 1.5rem; font-weight: 800; color: var(--kc,#1a56a0); line-height: 1; }
  .kanban-col .kanban-un { font-size: 0.65rem; color: #94a3b8; margin-top: 2px; }
  .kanban-col .kanban-mini-bar { height: 4px; background: #f1f5f9; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .kanban-col .kanban-mini-fill { height: 100%; border-radius: 2px; background: var(--kc,#94a3b8); transition: width .4s; }

  /* ── Alert card propostas paradas ──────────────────────────────── */
  .alert-paradas {
    background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px;
    padding: 12px 18px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 0.85rem; color: #9a3412;
  }
  .alert-paradas button {
    background: #ea580c; color: white; border: none; border-radius: 6px;
    padding: 5px 14px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
  }
  .alert-paradas button:hover { background: #c2410c; }

  /* ── View toggle ─────────────────────────────────────────────────── */
  .view-toggle {
    display: flex; gap: 4px; background: #f1f5f9;
    border-radius: 8px; padding: 3px; width: fit-content;
  }
  .view-toggle button {
    padding: 6px 16px; border: none; border-radius: 6px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    color: #64748b; background: transparent; transition: all .15s;
  }
  .view-toggle button.ativo { background: white; color: #1a56a0; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* ── Semáforo dias parado ──────────────────────────────────────── */
  .dias-chip {
    display: inline-block; border-radius: 20px; padding: 2px 8px;
    font-size: 0.72rem; font-weight: 700; white-space: nowrap;
  }

  /* ── Tag chips ───────────────────────────────────────────────────── */
  .tag-container { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 3px;
    background: #e0e7ff; color: #3730a3;
    border-radius: 20px; padding: 2px 8px; font-size: 0.68rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; user-select: none;
  }
  .tag-chip:hover { background: #c7d2fe; }
  .tag-chip.urgente  { background: #fee2e2; color: #991b1b; }
  .tag-chip.prioridade { background: #fef3c7; color: #92400e; }
  .tag-add {
    background: #f1f5f9; border: 1px dashed #cbd5e1; border-radius: 20px;
    padding: 2px 7px; font-size: 0.72rem; cursor: pointer; color: #64748b; line-height: 1.2;
  }
  .tag-add:hover { background: #e2e8f0; }
  .tag-opcoes { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  .tag-opc {
    padding: 6px 14px; border: 1.5px solid #e2e8f0; border-radius: 20px;
    font-size: 0.8rem; cursor: pointer; background: white; color: #334155; transition: all .15s;
  }
  .tag-opc:hover { border-color: #1a56a0; color: #1a56a0; }
  .tag-opc.ativa { background: #1a56a0; color: white; border-color: #1a56a0; }

  /* ── Confirmação modal ───────────────────────────────────────────── */
  .confirm-modal-box {
    background: white; border-radius: 14px; padding: 28px;
    max-width: 480px; width: 94%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .confirm-modal-box h3 { font-size: 1rem; font-weight: 700; color: #1a202c; margin-bottom: 18px; }
  .confirm-sumario {
    background: #f8fafc; border-radius: 8px; padding: 14px 16px; margin-bottom: 18px;
  }
  .confirm-sumario .cs-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; }
  .confirm-sumario .cs-label { color: #64748b; }
  .confirm-sumario .cs-val   { font-weight: 700; color: #1a202c; }
  .confirm-sumario .cs-alvo  { color: #16a34a; font-size: 1rem; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-confirmar {
    background: #16a34a; color: white; border: none; border-radius: 8px;
    padding: 9px 22px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
  }
  .btn-confirmar:hover { background: #15803d; }

  /* ── Relatório de produtividade ──────────────────────────────────── */
  .relatorio-section {
    background: white; border-radius: 10px; padding: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-top: 24px; overflow: hidden;
  }
  .relatorio-section > summary {
    padding: 14px 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
    color: #1a202c; border-bottom: 1px solid transparent; list-style: none;
    display: flex; align-items: center; gap: 8px;
  }
  .relatorio-section[open] > summary { border-bottom-color: #f1f5f9; }
  .relatorio-inner { padding: 18px; }
  .relatorio-kpis { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; margin-bottom: 18px; }
  .relatorio-kpi { background: #f8fafc; border-radius: 8px; padding: 12px 14px; text-align: center; }
  .relatorio-kpi .rk-val { font-size: 1.6rem; font-weight: 800; color: #1a56a0; line-height: 1; }
  .relatorio-kpi .rk-lbl { font-size: 0.72rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: .4px; }
  .relatorio-chart-wrap { height: 180px; position: relative; }

  /* Toolbar extras */
  .op-obs-input {
    padding: 7px 12px; border: 1px solid #cbd5e1; border-radius: 7px;
    font-size: 0.82rem; min-width: 160px; color: #1a202c;
  }
  .btn-exportar-selecao {
    background: white; border: 1px solid #1a56a0; color: #1a56a0; border-radius: 7px;
    padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .btn-exportar-selecao:hover { background: #eff6ff; }
  .btn-import-label {
    background: white; border: 1px solid #cbd5e1; border-radius: 7px;
    padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    color: #475569; white-space: nowrap; display: inline-flex; align-items: center;
  }
  .btn-import-label:hover { background: #f1f5f9; }
  .import-result {
    background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
    padding: 10px 14px; font-size: 0.82rem; color: #166534;
  }

  /* Kanban full */
  .kanban-full {
    display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; align-items: start;
  }
  @media (max-width: 1100px) {
    .kanban-full, .kanban-bar { grid-template-columns: repeat(3,1fr); }
  }
  @media (max-width: 700px) {
    .kanban-full, .kanban-bar { grid-template-columns: repeat(2,1fr); }
  }
  .kanban-lane {
    background: #f8fafc; border-radius: 10px; overflow: hidden;
    border-top: 3px solid var(--kc,#94a3b8);
  }
  .kanban-lane-header {
    background: white; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.78rem; font-weight: 700; color: var(--kc,#64748b);
    cursor: pointer; border-bottom: 1px solid #f1f5f9;
  }
  .kanban-lane-header:hover { background: #f1f5f9; }
  .kanban-lane-count {
    background: var(--kc,#94a3b8); color: white;
    border-radius: 20px; padding: 1px 8px; font-size: 0.68rem; flex-shrink: 0;
  }
  .kanban-card {
    background: white; margin: 8px; border-radius: 8px; padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); font-size: 0.78rem;
    cursor: pointer; transition: box-shadow .1s;
  }
  .kanban-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
  .kanban-card-mun { font-weight: 700; color: #1a202c; }
  .kanban-card-ent { color: #64748b; font-size: 0.7rem; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kanban-empty-hint { color: #94a3b8; font-size: 0.72rem; padding: 16px; text-align: center; }

  /* ── Tooltip universal (data-tip) ──────────────────────────────────── */
  [data-tip], [data-tip-b] { position: relative; }
  /* tooltip padrão: aparece ACIMA */
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 9px); left: 50%;
    transform: translateX(-50%);
    background: #1e293b; color: #f1f5f9; font-size: 0.7rem; font-weight: 400;
    padding: 6px 11px; border-radius: 7px; white-space: pre-line;
    width: max-content; max-width: 260px; line-height: 1.5;
    pointer-events: none; opacity: 0; transition: opacity .18s;
    z-index: 9000; text-align: left; box-shadow: 0 4px 16px rgba(0,0,0,.22);
  }
  [data-tip]::before {
    content: ''; position: absolute; bottom: calc(100% + 3px); left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #1e293b;
    pointer-events: none; opacity: 0; transition: opacity .18s; z-index: 9001;
  }
  [data-tip]:hover::after, [data-tip]:hover::before { opacity: 1; }
  /* tooltip abaixo: para elementos perto do topo (evita ficar atrás do cabeçalho sticky) */
  [data-tip-b]::after {
    content: attr(data-tip-b);
    position: absolute; top: calc(100% + 9px); bottom: auto; left: 50%;
    transform: translateX(-50%);
    background: #1e293b; color: #f1f5f9; font-size: 0.7rem; font-weight: 400;
    padding: 6px 11px; border-radius: 7px; white-space: pre-line;
    width: max-content; max-width: 260px; line-height: 1.5;
    pointer-events: none; opacity: 0; transition: opacity .18s;
    z-index: 9000; text-align: left; box-shadow: 0 4px 16px rgba(0,0,0,.22);
  }
  [data-tip-b]::before {
    content: ''; position: absolute; top: calc(100% + 3px); bottom: auto; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent; border-bottom-color: #1e293b;
    pointer-events: none; opacity: 0; transition: opacity .18s; z-index: 9001;
  }
  [data-tip-b]:hover::after, [data-tip-b]:hover::before { opacity: 1; }
  /* cards clicáveis */
  .card-nav { cursor: pointer; transition: transform .15s, box-shadow .15s; }
  .card-nav:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.13); }

  /* ── Semáforo geral ─────────────────────────────────────────────────── */
  .semaforo-card { transition: background .3s, border-color .3s; }
  .semaforo-dot { width: 18px; height: 18px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .semaforo-razao { font-size: 0.72rem; color: inherit; margin-top: 4px; opacity: .8; }
  .card-delta { font-size: 0.72rem; margin-top: 5px; opacity: .75; }
  .card-delta.pos { color: #16a34a; }
  .card-delta.neu { color: #64748b; }

  /* ── Tempo médio por etapa ──────────────────────────────────────────── */
  .tempo-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr));
    gap: 10px; margin-bottom: 28px;
  }
  .tempo-card {
    background: white; border-radius: 10px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid var(--tc,#94a3b8);
    display: flex; flex-direction: column; gap: 4px;
  }
  .tempo-card .tc-etapa { font-size: 0.72rem; font-weight: 700; color: var(--tc,#64748b); text-transform: uppercase; letter-spacing: .5px; }
  .tempo-card .tc-dias  { font-size: 1.8rem; font-weight: 800; color: var(--tc,#1a56a0); line-height: 1; }
  .tempo-card .tc-sub   { font-size: 0.7rem; color: #94a3b8; }
  .tempo-card .tc-badge { font-size: 0.68rem; font-weight: 700; border-radius: 20px; padding: 1px 8px; width: fit-content; }

  /* ── Top municípios ─────────────────────────────────────────────────── */
  .mun-lista { max-height: 320px; overflow-y: auto; }
  .mun-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mun-nome { width: 140px; font-size: 0.78rem; font-weight: 600; color: #1a202c; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mun-uf   { width: 28px; font-size: 0.72rem; font-weight: 700; color: #1a56a0; flex-shrink: 0; }
  .mun-bar-wrap { flex: 1; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
  .mun-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg,#7c3aed,#a78bfa); transition: width .4s; }
  .mun-qtd { width: 80px; text-align: right; font-size: 0.72rem; color: #64748b; flex-shrink: 0; }

  /* ── Responsável ─────────────────────────────────────────────────────── */
  .resp-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0;
    border-radius: 20px; padding: 2px 9px; font-size: 0.7rem; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .resp-chip:hover { background: #dcfce7; }
  .resp-vazio { font-size: 0.7rem; color: #cbd5e1; cursor: pointer; }
  .resp-vazio:hover { color: #94a3b8; }
  .resp-modal-box {
    background: white; border-radius: 14px; padding: 24px;
    max-width: 360px; width: 94%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .resp-modal-box h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }
  .resp-modal-box input {
    width: 100%; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
    font-size: 0.85rem; margin-bottom: 14px; outline: none;
  }
  .resp-modal-box input:focus { border-color: #1a56a0; }
  .resp-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Modal detalhe — histórico ──────────────────────────────────────── */
  .modal-historico { margin-top: 18px; border-top: 1px solid #e2e8f0; padding-top: 14px; }
  .modal-historico h4 { font-size: 0.78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .hist-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; font-size: 0.78rem; }
  .hist-seta { color: #94a3b8; font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
  .hist-de   { color: #64748b; }
  .hist-para { font-weight: 700; color: #1a56a0; }
  .hist-obs  { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }
  .hist-data { margin-left: auto; font-size: 0.68rem; color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .modal-tag-chip {
    background: #ede9fe; color: #5b21b6; border-radius: 20px;
    font-size: 0.68rem; font-weight: 700; padding: 2px 9px;
  }

  /* ── Auto-refresh toggle ─────────────────────────────────────────────── */
  .btn-autorefresh {
    background: white; border: 1px solid #cbd5e1; border-radius: 7px;
    padding: 7px 12px; font-size: 0.78rem; cursor: pointer; color: #64748b;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .btn-autorefresh.ativo { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
  .btn-autorefresh .ar-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* ── Aba Fluxo de Captura ──────────────────────────────────────────── */
  .fluxo-pipeline { display: flex; flex-direction: column; gap: 0; max-width: 820px; margin: 0 auto; }
  .fluxo-etapa {
    background: white; border-radius: 10px; padding: 18px 22px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-left: 4px solid var(--fc, #1a56a0);
    position: relative;
  }
  .fluxo-etapa + .fluxo-etapa::before {
    content: '↓'; display: block; text-align: center;
    color: #94a3b8; font-size: 1.2rem; padding: 6px 0;
  }
  .fluxo-etapa h4 { font-size: 0.82rem; font-weight: 700; color: var(--fc, #1a56a0); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .fluxo-etapa p  { font-size: 0.82rem; color: #475569; line-height: 1.6; }
  .fluxo-etapa code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 0.78rem; }
  .fluxo-badge {
    position: absolute; top: 14px; right: 16px;
    font-size: 0.68rem; font-weight: 700; padding: 2px 9px;
    border-radius: 20px; background: var(--fc, #1a56a0); color: white;
  }
  .fluxo-qualidade { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-top: 24px; }
  .fluxo-qualidade table { font-size: 0.8rem; width: 100%; border-collapse: collapse; }
  .fluxo-qualidade th { background: #f8fafc; padding: 8px 12px; text-align: left; font-weight: 600; color: #475569; border-bottom: 1px solid #e2e8f0; }
  .fluxo-qualidade td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
  .fluxo-qualidade .ok  { color: #16a34a; font-weight: 700; }
  .fluxo-qualidade .warn{ color: #d97706; font-weight: 700; }
</style>
</head>
<body>
<div id="app">

<div v-if="erro" style="background:#fef2f2;border-left:4px solid #dc2626;padding:14px 20px;font-size:0.85rem;color:#7f1d1d;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
  <span>⚠️ {{ erro }}</span>
  <span style="display:flex;align-items:center;gap:8px">
    <code style="background:#fee2e2;padding:2px 6px;border-radius:4px;font-size:0.8rem">{{ apiBaseAtual || '(mesmo host)' }}</code>
    <button @click="reconfigurarApi" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:0.8rem">Reconfigurar URL</button>
  </span>
</div>

<header>
  <div class="logo">🏘️</div>
  <div>
    <h1>MCMV Rural — Painel de Acompanhamento de Implantação</h1>
    <p>Seleção MCID 2025/2026 · Publicado em 12/06/2026 · Fonte: Portaria MCID nº 1.161/2025</p>
  </div>
</header>

<template v-if="stats && !carregando">

  <!-- Navegação por abas -->
  <nav class="tab-nav">
    <button class="tab-btn" :class="{ativa: aba==='dashboard'}" @click="aba='dashboard'">
      Dashboard
    </button>
    <button class="tab-btn" :class="{ativa: aba==='propostas'}" @click="aba='propostas'">
      Propostas <span class="tab-badge">{{ fmt(stats.total_propostas) }}</span>
    </button>
    <button class="tab-btn" :class="{ativa: aba==='hash-cnpj'}" @click="aba='hash-cnpj'">
      Hash &amp; CNPJ
    </button>
    <button class="tab-btn" :class="{ativa: aba==='operacoes'}" @click="aba='operacoes'">
      Operações
    </button>
    <button class="tab-btn" :class="{ativa: aba==='fluxo'}" @click="aba='fluxo'">
      Fluxo de Captura
    </button>
  </nav>

<div class="container">

<!-- ═══════════════════════════════ ABA: DASHBOARD ════════════════════════ -->
<div v-show="aba==='dashboard'">

  <!-- Cards de resumo + semáforo -->
  <div class="cards">
    <!-- Semáforo geral — clicável → abre Hash & CNPJ -->
    <div class="card semaforo-card card-nav"
         :style="{'--accent': semaforoInfo.cor, background: semaforoInfo.bg}"
         data-tip-b="Critério:
Verde = ≥20% chaves entregues + <30% CNPJs inválidos
Amarelo = ≥5% entregas ou <50% inválidos
Vermelho = muitos CNPJs pendentes

Clique para ver cobertura de CNPJs"
         @click="aba='hash-cnpj'">
      <div class="val" style="display:flex;align-items:center;gap:8px">
        <span class="semaforo-dot" :style="{background: semaforoInfo.cor}"></span>
        {{ semaforoInfo.nivel }}
      </div>
      <div class="lbl">Status do Projeto</div>
      <div class="semaforo-razao">{{ semaforoInfo.razao }}</div>
    </div>
    <!-- Propostas → aba Propostas -->
    <div class="card card-nav" style="--accent:#1a56a0"
         data-tip-b="Total de propostas válidas (UUIDs completos).
Clique para listar todas na aba Propostas."
         @click="filtroUF=''; filtroEtapa=''; busca=''; pagina=1; aba='propostas'">
      <div class="val">{{ fmt(stats.total_propostas) }}</div>
      <div class="lbl">Propostas Selecionadas</div>
      <div class="card-delta" :class="stats.avancos_7d &gt; 0 ? 'pos' : 'neu'"
           data-tip-b="Avanços de etapa nos últimos 7 dias.
Clique para abrir o painel de Operações."
           @click.stop="aba='operacoes'; carregarOp()">
        {{ stats.avancos_7d &gt; 0 ? '+' + fmt(stats.avancos_7d) + ' avanços esta semana' : 'sem avanços esta semana' }}
      </div>
    </div>
    <!-- Unidades → aba Propostas -->
    <div class="card card-nav" style="--accent:#0d9488"
         data-tip-b="Soma de unidades habitacionais previstas em todas as propostas.
Clique para listar propostas."
         @click="filtroUF=''; filtroEtapa=''; busca=''; pagina=1; aba='propostas'">
      <div class="val">{{ fmt(stats.total_unidades) }}</div>
      <div class="lbl">Unidades Habitacionais</div>
    </div>
    <!-- UFs -->
    <div class="card" style="--accent:#7c3aed"
         data-tip-b="Estados com ao menos uma proposta selecionada.
Veja o ranking de UFs abaixo.">
      <div class="val">{{ stats.total_ufs }}</div>
      <div class="lbl">Estados (UF)</div>
    </div>
    <!-- Municípios -->
    <div class="card card-nav" style="--accent:#d97706"
         data-tip-b="Municípios únicos beneficiados.
Clique para rolar até o Top 10 Municípios."
         @click="document.querySelector('.mun-lista')?.scrollIntoView({behavior:'smooth'})">
      <div class="val">{{ fmt(stats.total_municipios) }}</div>
      <div class="lbl">Municípios Atendidos</div>
    </div>
    <!-- Selecionado → Operações -->
    <div class="card card-nav" style="--accent:#dc2626"
         data-tip-b="Propostas ainda na etapa inicial, aguardando habilitação da entidade.
Clique para gerenciar em Operações."
         @click="irParaOpEtapa('Selecionado')">
      <div class="val">{{ fmt(countEtapa('Selecionado')) }}</div>
      <div class="lbl">Aguardando Contratação</div>
    </div>
    <!-- Entrega das Chaves → Operações -->
    <div class="card card-nav" style="--accent:#16a34a"
         data-tip-b="Propostas que concluíram todo o ciclo de implantação.
Clique para ver em Operações."
         @click="irParaOpEtapa('Entrega das Chaves')">
      <div class="val">{{ fmt(countEtapa('Entrega das Chaves')) }}</div>
      <div class="lbl">Chaves Entregues</div>
    </div>
  </div>

  <!-- Funil de Etapas -->
  <div class="section-title">Funil de Implantação por Etapa</div>
  <div class="etapas-grid">
    <div
      v-for="(etapa, i) in etapas"
      :key="etapa.nome"
      class="etapa-card"
      :class="{ ativa: filtroEtapa === etapa.nome }"
      :style="{ '--cor': etapa.cor }"
      :data-tip="'Etapa ' + (i+1) + ' de 6\n' + fmt(countEtapa(etapa.nome)) + ' propostas · ' + fmt(unidEtapa(etapa.nome)) + ' unidades\n' + pct(countEtapa(etapa.nome)) + '% do total\n\nClique para filtrar na aba Propostas'"
      @click="irParaEtapa(etapa.nome)"
    >
      <span class="badge-pct">{{ pct(countEtapa(etapa.nome)) }}%</span>
      <div class="num">Etapa {{ i + 1 }}</div>
      <div class="nome">{{ etapa.nome }}</div>
      <div class="total">{{ fmt(countEtapa(etapa.nome)) }}</div>
      <div class="sub">propostas · {{ fmt(unidEtapa(etapa.nome)) }} un</div>
    </div>
  </div>

  <!-- Tempo médio por etapa -->
  <div class="section-title">Tempo Médio na Etapa Atual</div>
  <div class="tempo-grid">
    <div v-for="tm in tempoMedio" :key="tm.etapa" class="tempo-card card-nav" :style="{'--tc': tm.cor}"
         :data-tip="'Média de dias que cada proposta fica nesta etapa antes de avançar.\n\nNormal ≤ 30d | Atenção ≤ 60d | Crítico > 60d\n\nClique para gerenciar estas propostas em Operações.'"
         @click="irParaOpEtapa(tm.etapa)">
      <div class="tc-etapa">{{ tm.etapa }}</div>
      <div class="tc-dias">{{ tm.avg_dias }}<span style="font-size:1rem;font-weight:400">d</span></div>
      <div class="tc-sub">{{ fmt(tm.propostas) }} proposta(s)</div>
      <span class="tc-badge"
            :style="{background: corDiasBg(tm.avg_dias), color: corDias(tm.avg_dias)}">
        {{ tm.avg_dias &lt;= 30 ? 'Normal' : tm.avg_dias &lt;= 60 ? 'Atenção' : 'Crítico' }}
      </span>
    </div>
  </div>

  <!-- Gráfico + Por UF + Top Municípios -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px">
    <div class="painel-box">
      <div class="section-title">Distribuição por Etapa</div>
      <div class="chart-wrap">
        <canvas id="chartEtapas"></canvas>
      </div>
    </div>
    <div class="painel-box">
      <div class="section-title">Propostas por Estado (UF)</div>
      <div class="uf-lista">
        <div class="uf-row" style="cursor:pointer"
             v-for="uf in rankingUF" :key="uf.uf"
             :data-tip="uf.uf + ': ' + fmt(uf.propostas) + ' propostas · ' + fmt(uf.unidades) + ' unidades\nClique para filtrar na aba Propostas'"
             @click="irParaUF(uf.uf)">
          <div class="uf-nome">{{ uf.uf }}</div>
          <div class="uf-bar-wrap">
            <div class="uf-bar-fill" :style="{ width: (uf.propostas / rankingUF[0].propostas * 100) + '%' }"></div>
          </div>
          <div class="uf-qtd">{{ fmt(uf.propostas) }} · {{ fmt(uf.unidades) }} un</div>
        </div>
      </div>
    </div>
    <div class="painel-box">
      <div class="section-title">Top 10 Municípios por Unidades</div>
      <div class="mun-lista">
        <div class="mun-row" style="cursor:pointer"
             v-for="m in topMunicipios" :key="m.municipio + m.uf"
             :data-tip="m.municipio + ' · ' + m.uf + '\n' + fmt(m.propostas) + ' proposta(s) · ' + fmt(m.unidades) + ' unidades\nClique para buscar na aba Propostas'"
             @click="irParaMunicipio(m.municipio)">
          <div class="mun-uf">{{ m.uf }}</div>
          <div class="mun-nome">{{ m.municipio }}</div>
          <div class="mun-bar-wrap">
            <div class="mun-bar-fill"
                 :style="{ width: (topMunicipios.length ? m.unidades / topMunicipios[0].unidades * 100 : 0) + '%' }">
            </div>
          </div>
          <div class="mun-qtd">{{ fmt(m.unidades) }} un</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /aba dashboard -->

<!-- ═══════════════════════════════ ABA: PROPOSTAS ══════════════════════ -->
<div v-show="aba==='propostas'">

  <div class="section-title">Lista de Propostas</div>
  <div class="filtros">
    <select v-model="filtroUF"
            data-tip="Filtrar por estado (UF)">
      <option value="">Todos os estados</option>
      <option v-for="uf in listaUFs" :key="uf" :value="uf">{{ uf }}</option>
    </select>
    <select v-model="filtroEtapa"
            data-tip="Filtrar por etapa atual de implantação">
      <option value="">Todas as etapas</option>
      <option v-for="e in etapas" :key="e.nome" :value="e.nome">{{ e.nome }}</option>
    </select>
    <input v-model="busca" placeholder="Buscar município ou entidade..." style="min-width:220px"
           data-tip="Buscar por município, entidade, CNPJ ou número de proposta (UUID)" />
    <button class="btn-exportar" @click="exportarCSV"
            data-tip="Baixar CSV com todas as propostas filtradas
Inclui: UF, município, entidade, CNPJ, UUID, unidades, etapa, responsável">⬇ Exportar CSV</button>
    <span class="count-badge">{{ totalFiltrado }} propostas encontradas</span>
  </div>

  <div class="tabela-wrap">
    <table>
      <thead>
        <tr>
          <th @click="ordenar('uf')" data-tip="Ordenar por estado">UF {{ iconeOrdem('uf') }}</th>

              <button class="btn-copiar" :class="{copiado: hashCopiado===row.num_proposta}"

            </div>

          <td @click.stop>

    <div class="paginacao">
      <span class="info">Página {{ pagina }} de {{ totalPaginas }}</span>
      <button @click="pagina=1" :disabled="pagina===1">«</button>
      <button @click="pagina--" :disabled="pagina===1">‹</button>

      <button @click="pagina=totalPaginas" :disabled="pagina===totalPaginas">»</button>
      <select v-model.number="porPagina" style="margin-left:8px;font-size:0.8rem;padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px"

        <option :value="100">100/pág</option>

<div v-show="aba==='operacoes'">

    <div v-for="e in etapas" :key="e.nome" class="kanban-col"
         :class="{ativa: opView==='lista' && opFiltroEtapa===e.nome}"
         :style="{'--kc': e.cor}"

      <div class="kanban-nome">{{ e.nome }}</div>

Coluna opcional: observacao">

<script>
/*
 * Resolução do backend (prioridade decrescente):
 *   1. window.MCMV_API_BASE definido externamente
 *   2. localStorage 'mcmv_api'  (qualquer protocolo — salvo pelo botão Reconfigurar)
 *   3. file://  → prompt na primeira abertura → salva no localStorage
 *   4. http(s) servido pelo nginx → mesmo host (string vazia)
 */
function resolveApiBase() {
    if (window.MCMV_API_BASE) return window.MCMV_API_BASE.replace(/\/$/, '');
    try {
        const saved = localStorage.getItem('mcmv_api');
        if (saved) return saved.replace(/\/$/, '');
    } catch(_) {}
    if (window.location.protocol === 'file:') {
        const url = prompt(
            'URL do backend MCMV Rural:\n(ex: http://localhost:8082  ou  https://mcmv-rural-painel.fly.dev)',
            'http://localhost:8082'
        );
        const base = (url || 'http://localhost:8082').replace(/\/$/, '');
        try { localStorage.setItem('mcmv_api', base); } catch(_) {}
        return base;
    }
    return '';
}
const API_BASE = resolveApiBase();

const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

const ETAPAS_CONFIG = [
    { nome: 'Selecionado',             cor: '#3b82f6' },
    { nome: 'Habilitação da Entidade', cor: '#8b5cf6' },
    { nome: 'Contratação',             cor: '#f59e0b' },
    { nome: 'Início das Obras',        cor: '#f97316' },
    { nome: 'Em Execução',             cor: '#06b6d4' },
    { nome: 'Entrega das Chaves',      cor: '#16a34a' },
];

createApp({
    setup() {
        const carregando    = ref(true);
        const erro          = ref('');
        const stats         = ref(null);
        const aba           = ref('dashboard');
        const items         = ref([]);
        const totalFiltrado = ref(0);
        const detalhe       = ref(null);
        const hashCopiado   = ref('');
        const pagina        = ref(1);
        const porPagina     = ref(20);
        const totalPaginas  = ref(1);
        const filtroUF      = ref('');
        const filtroEtapa   = ref('');
        const busca         = ref('');
        const ordemCampo    = ref('');
        const ordemDir      = ref(1);
        // Hash & CNPJ tab state
        const hcBusca         = ref('');
        const hcFiltroStatus  = ref('');
        const hcPagina        = ref(1);
        const hcItems         = ref([]);

        const hcTotalPaginas  = ref(1);
        // Operações tab state
        const opFiltroEtapa   = ref('Selecionado');
        const opSelecionados  = ref({});   // { uuid: true } — O(1) lookup
        const opPagina        = ref(1);
        const opItems         = ref([]);
        const opTotal         = ref(0);
        const opTotalPaginas  = ref(1);
        const opHistorico     = ref([]);
        const opOrdemCampo    = ref('');
        const opOrdemDir      = ref(1);
        // Operações enhanced state
        const opView          = ref('lista');
        const opUF            = ref('');
        const opBusca         = ref('');
        const opFiltroParadas = ref(0);
        const opEtapaAlvo     = ref('');
        const opObservacao    = ref('');
        const opConfirmando   = ref(false);
        const opTagEditando   = ref(null);
        const opImportResult  = ref(null);
        const opRelatorio     = ref(null);
        const opQtdParadas    = ref(0);

        const opFiltroResp    = ref('');

        const opRespEditando  = ref(null);
        const opRespNome      = ref('');
        const tempoMedio      = ref([]);
        const topMunicipios   = ref([]);
        const TAGS_OPCOES = ['urgente', 'prioridade', 'pendência docs', 'aguardando vistoria', 'CNPJ irregular', 'auditoria'];
        const ETAPAS_CONTRATO = ['Contratação', 'Início das Obras', 'Em Execução', 'Entrega das Chaves'];
        let buscaTimer    = null;
        let hcTimer       = null;

        let opRefreshTimer = null;

        const etapas    = ETAPAS_CONFIG;
        const listaUFs  = computed(() => (stats.value?.por_uf || []).map(r => r.uf));
        const rankingUF = computed(() => stats.value?.por_uf ?? []);

        const fmt = n => (n ?? 0).toLocaleString('pt-BR');
        const pct = n => stats.value?.total_propostas
            ? Math.round(n / stats.value.total_propostas * 100) : 0;

        const countEtapa = nome =>
            stats.value?.por_etapa?.find(e => e.etapa === nome)?.propostas ?? 0;

            stats.value?.por_etapa?.find(e => e.etapa === nome)?.unidades ?? 0;

        const semaforoInfo = computed(() => {
            const s = stats.value;
            if (!s) return { nivel: 'Carregando', cor: '#94a3b8', bg: 'white', razao: '' };

            const entregues = countEtapa('Entrega das Chaves');
            const pctOk  = entregues / total;

                return { nivel: 'Verde', cor: '#16a34a', bg: '#f0fdf4', razao: `${fmt(entregues)} chaves entregues (${Math.round(pctOk*100)}%)` };
            if (pctOk >= 0.05 || invPct < 0.5)
                return { nivel: 'Amarelo', cor: '#d97706', bg: '#fffbeb', razao: `${Math.round(invPct*100)}% CNPJs pendentes` };
            return { nivel: 'Vermelho', cor: '#dc2626', bg: '#fef2f2', razao: `Alta pendência: ${fmt(s.cnpj_invalidos)} CNPJs inválidos` };
        });

        const avisosCnpjConfirm = computed(() => {
            if (!opEtapaAlvo.value || !ETAPAS_CONTRATO.includes(opEtapaAlvo.value)) return [];
            return opItems.value
                .filter(r => opSelecionados.value[r.num_proposta] && !cnpjValido(r.cnpj))
                .map(r => ({ num: r.num_proposta, municipio: r.municipio, cnpj: r.cnpj }));
        });

        // ── API ──────────────────────────────────────────────────────────────
        const carregarStats = async () => {
            const r = await fetch(`${API_BASE}/api/propostas/stats`);
            if (!r.ok) throw new Error(`/api/propostas/stats retornou ${r.status}`);
            stats.value = await r.json();
        };

        const carregarPropostas = async () => {
            const p = new URLSearchParams({
                pagina: pagina.value,
                por_pagina: porPagina.value,
            });
            if (filtroUF.value)    p.append('uf',    filtroUF.value);
            if (filtroEtapa.value) p.append('etapa', filtroEtapa.value);
            if (busca.value)       p.append('busca', busca.value);

            const r = await fetch(`${API_BASE}/api/propostas?${p}`);
            if (!r.ok) throw new Error(`/api/propostas retornou ${r.status}`);
            const d = await r.json();
            items.value         = d.items ?? [];
            totalFiltrado.value = d.total ?? 0;
            totalPaginas.value  = d.total_paginas ?? 1;
        };

        const salvarEtapa = async (proposta, novaEtapa) => {
            if (!novaEtapa || novaEtapa === proposta.etapa_atual) return;
            const anterior = proposta.etapa_atual;
            proposta.etapa_atual = novaEtapa;
            try {
                const r = await fetch(
                    `${API_BASE}/api/propostas/${encodeURIComponent(proposta.num_proposta)}/etapa`,
                    {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ etapa: novaEtapa }),
                    }
                );
                if (!r.ok) throw new Error(`PUT /etapa ${r.status}`);
                await carregarStats();
                renderGrafico();
            } catch (e) {
                proposta.etapa_atual = anterior;
                alert('Erro ao salvar etapa: ' + e.message);
            }
        };

        const exportarCSV = () => {
            const p = new URLSearchParams();
            if (filtroUF.value)    p.append('uf',    filtroUF.value);
            if (filtroEtapa.value) p.append('etapa', filtroEtapa.value);
            if (busca.value)       p.append('busca', busca.value);
            window.open(`${API_BASE}/api/propostas/export?${p}`, '_blank');
        };

        // ── Gráfico ──────────────────────────────────────────────────────────
        const renderGrafico = () => {
            if (!stats.value) return;
            nextTick(() => {
                const ctx = document.getElementById('chartEtapas');
                if (!ctx) return;
                if (graficoInst) graficoInst.destroy();
                graficoInst = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: etapas.map(e => e.nome),
                        datasets: [{
                            label: 'Propostas',
                            data:  etapas.map(e => countEtapa(e.nome)),
                            backgroundColor: etapas.map(e => e.cor + 'cc'),
                            borderColor:     etapas.map(e => e.cor),
                            borderWidth: 1.5, borderRadius: 6,
                        }],
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
                    },
                });
            });
        };

        const toggleFiltroEtapa = nome => {
            filtroEtapa.value = filtroEtapa.value === nome ? '' : nome;
            pagina.value = 1;
        };

        // ── Navegação analítica (Dashboard → outras abas) ────────────────────
        const irParaEtapa = nome => {
            filtroEtapa.value = nome;
            filtroUF.value    = '';
            busca.value       = '';
            pagina.value      = 1;
            aba.value         = 'propostas';
        };
        const irParaUF = uf => {
            filtroUF.value    = uf;
            filtroEtapa.value = '';
            busca.value       = '';
            pagina.value      = 1;
            aba.value         = 'propostas';
        };
        const irParaMunicipio = municipio => {
            busca.value       = municipio;
            filtroUF.value    = '';
            filtroEtapa.value = '';
            pagina.value      = 1;
            aba.value         = 'propostas';
        };
        const irParaOpEtapa = etapa => {
            opFiltroEtapa.value   = etapa;
            opPagina.value        = 1;
            opSelecionados.value  = {};
            aba.value             = 'operacoes';
            carregarOp();
        };

        const ordenar = campo => {
            if (ordemCampo.value === campo) ordemDir.value *= -1;
            else { ordemCampo.value = campo; ordemDir.value = 1; }
            items.value = [...items.value].sort((a, b) => {
                const va = a[campo], vb = b[campo];
                return (va < vb ? -1 : va > vb ? 1 : 0) * ordemDir.value;
            });
        };

        const iconeOrdem = campo =>
            ordemCampo.value !== campo ? '' : ordemDir.value === 1 ? ' ↑' : ' ↓';

        const paginasVisiveis = computed(() => {
            const total = totalPaginas.value, atual = pagina.value;
            const start = Math.max(1, atual - 2), end = Math.min(total, atual + 2);
            const range = [];
            for (let i = start; i <= end; i++) range.push(i);
            return range;
        });

        watch([filtroUF, filtroEtapa, porPagina], () => {
            pagina.value = 1;
            carregarPropostas();
        });
        watch(pagina, carregarPropostas);
        watch(busca, () => {
            clearTimeout(buscaTimer);
            buscaTimer = setTimeout(() => { pagina.value = 1; carregarPropostas(); }, 350);
        });

        // ── Hash & CNPJ tab ──────────────────────────────────────────────────
        const carregarHC = async () => {
            const p = new URLSearchParams({ pagina: hcPagina.value, por_pagina: 50 });
            if (hcBusca.value)        p.append('busca',       hcBusca.value);
            if (hcFiltroStatus.value) p.append('cnpj_status', hcFiltroStatus.value);
            const r = await fetch(`${API_BASE}/api/propostas?${p}`);
            if (!r.ok) return;
            const d = await r.json();
            hcItems.value        = d.items ?? [];
            hcTotal.value        = d.total ?? 0;
            hcTotalPaginas.value = d.total_paginas ?? 1;
        };

        const hcToggleFiltro = status => {
            hcFiltroStatus.value = hcFiltroStatus.value === status ? '' : status;
            hcPagina.value = 1;
            carregarHC();
        };

        const hcPaginasVisiveis = computed(() => {
            const total = hcTotalPaginas.value, atual = hcPagina.value;
            const start = Math.max(1, atual - 2), end = Math.min(total, atual + 2);
            const range = [];
            for (let i = start; i <= end; i++) range.push(i);
            return range;
        });

        // ── Operações tab ────────────────────────────────────────────────────
        // dias parado helpers
        const diasParado  = dt => dt ? Math.floor((Date.now() - new Date(dt)) / 86400000) : 0;
        const corDias     = n  => n <= 30 ? '#15803d' : n <= 60 ? '#b45309' : '#dc2626';
        const corDiasBg   = n  => n <= 30 ? '#f0fdf4' : n <= 60 ? '#fffbeb' : '#fef2f2';
        const parseTags   = raw => { try { return JSON.parse(raw || '[]'); } catch { return []; } };
        const opIconeOrdem = campo => opOrdemCampo.value !== campo ? '' : opOrdemDir.value === 1 ? ' ↑' : ' ↓';

        const ETAPA_IDX = Object.fromEntries(ETAPAS_CONFIG.map((e, i) => [e.nome, i]));
        const proximaEtapa = etapa => ETAPAS_CONFIG[ETAPA_IDX[etapa] + 1]?.nome ?? null;

        const qtdSelec = computed(() => Object.keys(opSelecionados.value).length);
        const estaSelec = id => !!opSelecionados.value[id];

        const toggleSelecao = id => {
            const s = { ...opSelecionados.value };
            if (s[id]) delete s[id]; else s[id] = true;
            opSelecionados.value = s;
        };

        const selecionarTodosOp = () => {
            if (qtdSelec.value === opItems.value.length && opItems.value.length > 0) {
                opSelecionados.value = {};
            } else {
                const s = {};
                opItems.value.forEach(r => { s[r.num_proposta] = true; });
                opSelecionados.value = s;
            }
        };

        const opPaginasVisiveis = computed(() => {
            const total = opTotalPaginas.value, atual = opPagina.value;
            const start = Math.max(1, atual - 2), end = Math.min(total, atual + 2);
            const range = [];
            for (let i = start; i <= end; i++) range.push(i);
            return range;
        });

        const calcularParadas = async () => {
            const p = new URLSearchParams({ etapa: opFiltroEtapa.value, dias_sem_mover: 60, por_pagina: 1 });
            if (opUF.value) p.append('uf', opUF.value);
            const r = await fetch(`${API_BASE}/api/propostas?${p}`);
            if (!r.ok) return;
            const d = await r.json();
            opQtdParadas.value = d.total ?? 0;
        };

        const carregarTempoMedio = async () => {
            const r = await fetch(`${API_BASE}/api/propostas/tempo-medio`);
            if (r.ok) tempoMedio.value = await r.json();
        };

        const carregarTopMunicipios = async () => {
            const r = await fetch(`${API_BASE}/api/propostas/top-municipios?limite=10`);
            if (r.ok) topMunicipios.value = await r.json();
        };

        const carregarOp = async () => {
            const p = new URLSearchParams({ pagina: opPagina.value, por_pagina: 30, etapa: opFiltroEtapa.value });
            if (opUF.value)            p.append('uf',             opUF.value);
            if (opBusca.value)         p.append('busca',          opBusca.value);
            if (opFiltroParadas.value) p.append('dias_sem_mover', opFiltroParadas.value);
            if (opFiltroTag.value)     p.append('tags',           opFiltroTag.value);
            if (opFiltroResp.value)    p.append('responsavel',    opFiltroResp.value);
            const r = await fetch(`${API_BASE}/api/propostas?${p}`);
            if (!r.ok) return;
            const d = await r.json();
            opItems.value        = d.items ?? [];
            opTotal.value        = d.total ?? 0;
            opTotalPaginas.value = d.total_paginas ?? 1;
            opSelecionados.value = {};
            calcularParadas();
        };

        const opBuscaDebounce = () => {
            clearTimeout(opBuscaTimer);
            opBuscaTimer = setTimeout(() => { opPagina.value = 1; opSelecionados.value = {}; carregarOp(); }, 350);
        };

        const carregarHistorico = async () => {
            const r = await fetch(`${API_BASE}/api/historico?limite=30`);
            if (!r.ok) return;
            opHistorico.value = await r.json();
        };

        const solicitarConfirmacao = () => {
            if (!opEtapaAlvo.value || qtdSelec.value === 0) return;
            opConfirmando.value = true;
        };

        const confirmarAvancoEmMassa = async () => {
            opConfirmando.value = false;
            const ids = Object.keys(opSelecionados.value);
            if (!opEtapaAlvo.value || !ids.length) return;
            const r = await fetch(`${API_BASE}/api/propostas/bulk/etapa`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids, etapa: opEtapaAlvo.value, observacao: opObservacao.value || null }),
            });
            if (!r.ok) { alert('Erro ao avançar propostas'); return; }
            opEtapaAlvo.value  = '';
            opObservacao.value = '';
            await Promise.all([carregarStats(), carregarOp(), carregarHistorico()]);
            renderGrafico();
        };

        // Tags
        const abrirTagEditor = row => { opTagEditando.value = { ...row }; };

        const toggleTag = async (row, tag) => {
            if (!row) return;
            const rowRef = opItems.value.find(r => r.num_proposta === row.num_proposta) || row;
            const atual = parseTags(rowRef.tags);
            const novas = atual.includes(tag) ? atual.filter(t => t !== tag) : [...atual, tag];
            const res = await fetch(`${API_BASE}/api/propostas/${encodeURIComponent(rowRef.num_proposta)}/tags`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tags: novas }),
            });
            if (!res.ok) return;
            const updated = await res.json();
            rowRef.tags = JSON.stringify(updated.tags);
            if (opTagEditando.value?.num_proposta === rowRef.num_proposta) {
                opTagEditando.value = { ...rowRef };
            }
        };

        const removerTag = (row, tag) => toggleTag(row, tag);

        const abrirRespEditor = row => {
            opRespEditando.value = { ...row };
            opRespNome.value = row.responsavel || '';
            Vue.nextTick(() => { document.querySelector('.resp-modal-box input')?.focus(); });
        };

        const salvarResponsavel = async () => {
            const row = opRespEditando.value;
            if (!row) return;
            await fetch(`${API_BASE}/api/propostas/${encodeURIComponent(row.num_proposta)}/responsavel`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ responsavel: opRespNome.value || null }),
            });
            opRespEditando.value = null;
            carregarOp();
        };

        const removerResponsavel = async () => {
            const row = opRespEditando.value;
            if (!row) return;
            await fetch(`${API_BASE}/api/propostas/${encodeURIComponent(row.num_proposta)}/responsavel`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ responsavel: null }),
            });
            opRespEditando.value = null;
            carregarOp();
        };

        const toggleAutoRefresh = () => {
            opAutoRefresh.value = !opAutoRefresh.value;
            if (opAutoRefresh.value) {
                opRefreshTimer = setInterval(() => carregarOp(), 30000);
            } else {
                clearInterval(opRefreshTimer);
            }
        };

        // Exportar seleção (client-side)
        const exportarSelecao = () => {
            const sels = opItems.value.filter(r => estaSelec(r.num_proposta));
            if (!sels.length) return;
            const header = ['UF','Município','Entidade','CNPJ','Nº Proposta','Unidades','Etapa Atual','Dias na Etapa','Tags'];
            const rows = sels.map(r => [
                r.uf, r.municipio, r.entidade, r.cnpj, r.num_proposta,
                r.unidades, r.etapa_atual, diasParado(r.atualizado_em),
                parseTags(r.tags).join(';'),
            ]);
            const csv = [header, ...rows]
                .map(row => row.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(','))
                .join('\n');
            const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url;
            a.download = `operacoes_${opFiltroEtapa.value.replace(/\s+/g,'_')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // Import CSV via backend
        const importarCSV = async event => {
            const file = event.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            event.target.value = '';
            const r = await fetch(`${API_BASE}/api/propostas/import`, { method: 'POST', body: fd });
            if (!r.ok) { alert('Erro no import'); return; }
            opImportResult.value = await r.json();
            await Promise.all([carregarStats(), carregarOp(), carregarHistorico()]);
            renderGrafico();
            setTimeout(() => { opImportResult.value = null; }, 8000);
        };

        // Relatório de produtividade
        const renderRelatorio = () => {
            const ctx = document.getElementById('chartRelatorio');
            if (!ctx || !opRelatorio.value) return;
            if (relatorioChart) relatorioChart.destroy();
            const dados = opRelatorio.value.por_dia;
            relatorioChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.map(d => d.data.substring(5)),
                    datasets: [{ label: 'Avanços', data: dados.map(d => d.avancadas),
                        backgroundColor: '#3b82f6cc', borderColor: '#1a56a0', borderWidth: 1.5, borderRadius: 4 }],
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
                },
            });
        };

        const carregarRelatorio = async () => {
            const r = await fetch(`${API_BASE}/api/historico/relatorio?dias=30`);
            if (!r.ok) return;
            opRelatorio.value = await r.json();
            nextTick(renderRelatorio);
        };

        const onRelatorioToggle = event => {
            if (event.target.open && !opRelatorio.value) carregarRelatorio();
            else if (event.target.open) nextTick(renderRelatorio);
        };

        const opOrdenar = campo => {
            if (opOrdemCampo.value === campo) opOrdemDir.value *= -1;
            else { opOrdemCampo.value = campo; opOrdemDir.value = 1; }
            opItems.value = [...opItems.value].sort((a, b) => {
                const va = a[campo], vb = b[campo];
                return (va < vb ? -1 : va > vb ? 1 : 0) * opOrdemDir.value;
            });
        };

        const formatarData = iso => {
            if (!iso) return '';
            const d = new Date(iso), agora = new Date();
            const diff = Math.floor((agora - d) / 1000);
            if (diff < 60)   return 'agora';
            if (diff < 3600) return `${Math.floor(diff/60)} min atrás`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h atrás`;
            const dias = Math.floor(diff/86400);
            if (dias === 1)  return 'ontem';
            if (dias < 7)   return `${dias} dias atrás`;
            return d.toLocaleDateString('pt-BR');
        };

        watch(opPagina, carregarOp);
        watch(aba, v => {
            if (v === 'operacoes') { carregarOp(); carregarHistorico(); }
            if (v === 'hash-cnpj') carregarHC();
            if (v === 'dashboard') nextTick(renderGrafico);
        });

        watch(hcBusca, () => {
            clearTimeout(hcTimer);
            hcTimer = setTimeout(() => { hcPagina.value = 1; carregarHC(); }, 350);
        });
        watch(hcPagina, carregarHC);
        watch(hcFiltroStatus, () => { hcPagina.value = 1; carregarHC(); });


        // ── CNPJ helpers ─────────────────────────────────────────────────────
        const CNPJ_RE = /^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$/;
        const cnpjValido = cnpj => CNPJ_RE.test(cnpj || '');
        const cnpjNums   = cnpj => (cnpj || '').replace(/[^\d]/g, '');

        // ── Clipboard ────────────────────────────────────────────────────────
        const copiarHash = hash => {
            if (!hash) return;
            navigator.clipboard?.writeText(hash).catch(() => {});
            hashCopiado.value = hash;
            setTimeout(() => { hashCopiado.value = ''; }, 1800);
        };

        // ── Modal detalhe ─────────────────────────────────────────────────────
        const detalheCarregando = ref(false);
        const abrirDetalhe = async row => {
            // abre imediatamente com dados da lista (sem histórico)
            detalhe.value = { ...row, historico: [] };
            detalheCarregando.value = true;
            try {
                const r = await fetch(`${API_BASE}/api/propostas/${encodeURIComponent(row.num_proposta)}`);
                if (r.ok) detalhe.value = await r.json();
            } catch(_) {}
            detalheCarregando.value = false;
        };

        // ── Reconfigurar API ──────────────────────────────────────────────────
        const apiBaseAtual = ref(API_BASE);
        const reconfigurarApi = () => {
            const url = prompt(
                'Nova URL do backend MCMV Rural:\n(ex: http://localhost:8082  ou  https://mcmv-rural-painel.fly.dev)',
                API_BASE || 'http://localhost:8082'
            );
            if (!url) return;
            const base = url.trim().replace(/\/$/, '');
            try { localStorage.setItem('mcmv_api', base); } catch(_) {}
            window.location.reload();
        };

        onMounted(async () => {
            try {
                await carregarStats();
                await Promise.all([
                    carregarPropostas(), carregarHC(), carregarOp(),
                    carregarHistorico(), carregarTempoMedio(), carregarTopMunicipios(),
                ]);
                renderGrafico();
            } catch (e) {
                erro.value = `Não foi possível conectar ao backend (${API_BASE || 'mesmo host'}): ${e.message}.`;
            } finally {
                carregando.value = false;
            }
        });

        return {
            carregando, erro, stats, aba, items, totalFiltrado,
            pagina, porPagina, totalPaginas, paginasVisiveis,
            filtroUF, filtroEtapa, busca,
            etapas, listaUFs, rankingUF,
            fmt, pct, countEtapa, unidEtapa,
            toggleFiltroEtapa, salvarEtapa, exportarCSV,
            irParaEtapa, irParaUF, irParaMunicipio, irParaOpEtapa,
            ordenar, iconeOrdem,
            detalhe, detalheCarregando, hashCopiado, cnpjValido, cnpjNums, copiarHash, abrirDetalhe,
            hcBusca, hcFiltroStatus, hcToggleFiltro,
            hcPagina, hcItems, hcTotal, hcTotalPaginas, hcPaginasVisiveis,
            // Operações base
            opFiltroEtapa, opSelecionados, opPagina, opItems, opTotal,
            opTotalPaginas, opPaginasVisiveis, opHistorico,
            qtdSelec, estaSelec, toggleSelecao, selecionarTodosOp,
            proximaEtapa, opOrdenar, formatarData, opIconeOrdem,
            // Operações enhanced
            opView, opUF, opBusca, opFiltroParadas, opEtapaAlvo, opObservacao,
            opConfirmando, opTagEditando, opImportResult, opRelatorio, opQtdParadas,
            opFiltroTag, opFiltroResp, opAutoRefresh,
            opRespEditando, opRespNome,
            TAGS_OPCOES,
            semaforoInfo, avisosCnpjConfirm,
            tempoMedio, topMunicipios,
            diasParado, corDias, corDiasBg, parseTags,
            opBuscaDebounce, carregarOp,
            solicitarConfirmacao, confirmarAvancoEmMassa,
            abrirTagEditor, toggleTag, removerTag,
            abrirRespEditor, salvarResponsavel, removerResponsavel,
            toggleAutoRefresh,
            exportarSelecao, importarCSV,
            onRelatorioToggle,
            apiBaseAtual, reconfigurarApi,
        };
    },
}).mount('#app');
</script>
</body>
</html>
