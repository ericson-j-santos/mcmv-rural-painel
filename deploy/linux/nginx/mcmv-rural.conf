# MCMV Rural — Painel de Acompanhamento de Implantação
# Backend : uvicorn em 127.0.0.1:8082
# Estático: /var/www/mcmv-rural/static
#
# Certificado SSL: autoassinado em /etc/ssl/mcmv-rural/ (gerado pelo setup.sh)
#                  ou Let's Encrypt em /etc/letsencrypt/live/ (setup.sh --ssl)
#
# Instalar em: /etc/nginx/sites-available/mcmv-rural.conf
# Ativar com:  ln -s /etc/nginx/sites-available/mcmv-rural.conf /etc/nginx/sites-enabled/

# ── Porta 80: redireciona tudo para 443 ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME_AQUI;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Porta 443: HTTPS — frontend Vue + proxy /api ─────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name SERVER_NAME_AQUI;

    # Certificado (autoassinado por padrão; substituído pelo certbot se --ssl)
    ssl_certificate     /etc/ssl/mcmv-rural/cert.pem;
    ssl_certificate_key /etc/ssl/mcmv-rural/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Segurança
    add_header X-Frame-Options        SAMEORIGIN  always;
    add_header X-Content-Type-Options nosniff     always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Logs
    access_log /var/log/nginx/mcmv-rural-access.log;
    error_log  /var/log/nginx/mcmv-rural-error.log;

    root  /var/www/mcmv-rural/static;
    index index.html;

    # ── Proxy /api → FastAPI (uvicorn 127.0.0.1:8082) ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      "*";
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type";
            add_header Access-Control-Max-Age           600;
            return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Frontend Vue (SPA — history mode) ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location ~ /\. { deny all; }
}
